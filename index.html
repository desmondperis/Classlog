<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Class Log · Mount Carmel School</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3866B0; --blue-d:#274C87; --blue-l:#eaf0f9;
  --orange:#F5911E; --orange-d:#DE7A0C;
  --ink:#17233b; --muted:#5a6a7d; --bg:#eef2f7; --surface:#ffffff; --line:#dde5ee;
  --ok:#1f7a4d;
  --mon:#2b5290; --tue:#2E6C8E; --wed:#2F7D5A; --thu:#B0741C; --fri:#6b4a86;
  --r:14px; --rs:10px;
  --sh:0 1px 2px rgba(23,35,59,.05), 0 10px 30px rgba(23,35,59,.06);
  --shs:0 1px 2px rgba(23,35,59,.06);
  --fs: 'Hanken Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--fs); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.4;}
button,input,select,textarea{font:inherit; color:inherit}
a{color:var(--blue)}
.wrap{max-width:1120px; margin:0 auto; padding:0 16px 64px}

/* Header */
.top{background:var(--surface); color:var(--ink); padding:14px 0 0; box-shadow:0 2px 10px rgba(23,35,59,.05)}
.top .wrap{padding-bottom:0}
.brand{display:flex; align-items:center; gap:13px}
.logo{height:44px; width:auto; object-fit:contain; flex:0 0 auto; display:block}
.brand-txt{display:flex; flex-direction:column; min-width:0}
.brand-txt h1{font-size:19px; font-weight:800; letter-spacing:-.01em; margin:0; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.brand-txt .yr{font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; margin-top:2px}
.user{margin-left:auto; display:flex; align-items:center; gap:10px}
.user .av,.user img{width:30px; height:30px; border-radius:50%; object-fit:cover; background:var(--orange); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex:0 0 auto}
.user .uname{font-size:13.5px; font-weight:700; color:var(--ink); max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.signout{appearance:none; border:1px solid var(--line); background:var(--surface); color:var(--muted); border-radius:999px; padding:6px 12px; font-size:12.5px; font-weight:700; cursor:pointer}
.signout:hover{background:var(--bg); color:var(--blue); border-color:var(--blue)}
.tabs{display:flex; gap:2px; margin-top:12px; border-bottom:1px solid var(--line)}
.tab{appearance:none; border:0; background:transparent; color:var(--muted); padding:11px 16px 12px; font-weight:700; font-size:14px; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-1px}
.tab[aria-selected="true"]{color:var(--blue-d); border-bottom-color:var(--blue)}
.tab:hover{color:var(--blue)}
.tab:focus-visible{outline:2px solid var(--orange); outline-offset:-2px}

.banner{margin:14px 0 0; padding:11px 14px; border-radius:var(--rs); font-size:13px; font-weight:500; display:flex; gap:9px; align-items:flex-start}
.banner.warn{background:#fff5e6; color:#7a4a0c; border:1px solid #f0d9ad}
.banner.info{background:var(--blue-l); color:var(--blue-d); border:1px solid #cfddf3}
.banner b{font-weight:700}

/* Login gate */
.gate{min-height:66vh; display:flex; align-items:center; justify-content:center; padding:36px 0}
.gate-card{position:relative; overflow:hidden; background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:0 8px 44px rgba(23,35,59,.11); padding:38px 34px 34px; max-width:400px; width:100%; text-align:center}
.gate-card::before{content:""; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--blue),var(--orange))}
.gate-logo{width:104px; height:104px; object-fit:contain; margin:2px auto 12px; display:block}
.motto{font-size:13px; color:var(--muted); font-style:italic; font-weight:600}
.gate-div{height:1px; background:var(--line); margin:20px 0}
.gate-card h2{margin:0 0 6px; font-size:18px; font-weight:800; color:var(--blue-d)}
.gate-card p{margin:0 0 20px; font-size:13.5px; color:var(--muted); line-height:1.5}
.gbtn-wrap{display:flex; justify-content:center; min-height:44px}
.gbtn{appearance:none; display:inline-flex; align-items:center; gap:11px; background:#fff; border:1px solid #cdd6e2; border-radius:999px; padding:11px 22px; font-size:14.5px; font-weight:700; color:#26303c; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.05)}
.gbtn:hover{box-shadow:0 3px 12px rgba(23,35,59,.13); border-color:#b9c4d2}
.gbtn:focus-visible{outline:2px solid var(--blue); outline-offset:2px}
.gbtn svg{width:19px; height:19px; flex:0 0 auto}
.gnote{margin:16px 0 0; font-size:11.5px; color:var(--muted); line-height:1.5}

/* Controls */
.ctl{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-top:18px}
.field{display:flex; flex-direction:column; gap:5px}
.field label{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
select, input[type=text], input[type=date]{background:var(--surface); border:1px solid var(--line); border-radius:var(--rs); padding:10px 12px; font-size:14px; font-weight:500; min-height:42px; box-shadow:var(--shs)}
select{cursor:pointer; padding-right:30px}
input:focus, select:focus{outline:2px solid var(--blue); outline-offset:-1px; border-color:var(--blue)}
.wknav{display:flex; align-items:stretch; background:var(--surface); border:1px solid var(--line); border-radius:var(--rs); box-shadow:var(--shs); overflow:hidden}
.wknav button{appearance:none; border:0; background:transparent; width:42px; cursor:pointer; font-size:18px; color:var(--blue); font-weight:800}
.wknav button:hover{background:var(--blue-l)}
.wknav .lbl{display:flex; flex-direction:column; justify-content:center; padding:5px 14px; min-width:150px; text-align:center; border-left:1px solid var(--line); border-right:1px solid var(--line)}
.wknav .lbl b{font-size:14px; font-weight:700}
.wknav .lbl span{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.03em}
.pill{margin-left:auto; display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:13px; font-weight:700; box-shadow:var(--shs); align-self:center}
.pill .dot{width:8px; height:8px; border-radius:50%; background:var(--orange)}
.pill.done .dot{background:var(--ok)}
.btn{appearance:none; border:1px solid var(--line); background:var(--surface); border-radius:var(--rs); padding:10px 15px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:var(--shs); min-height:42px; display:inline-flex; align-items:center; gap:8px}
.btn:hover{border-color:var(--blue); color:var(--blue)}
.btn.primary{background:var(--blue); color:#fff; border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-d); color:#fff}
.btn:focus-visible{outline:2px solid var(--orange); outline-offset:2px}

/* Teacher day sections */
.prompt{margin-top:40px; text-align:center; color:var(--muted); background:var(--surface); border:1px dashed var(--line); border-radius:var(--r); padding:44px 20px}
.prompt b{color:var(--ink); font-size:16px; display:block; margin-bottom:6px}
.day{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh); margin-top:16px; overflow:hidden}
.day-h{display:flex; align-items:center; gap:12px; padding:13px 16px 13px 18px; border-left:6px solid var(--dc, var(--blue))}
.day-h h3{margin:0; font-size:15px; font-weight:800}
.day-h .date{font-size:12px; color:var(--muted); font-weight:600}
.day-h .cnt{margin-left:auto; font-size:12px; font-weight:700; color:var(--muted)}
.rows{padding:4px 12px 12px}
.row{display:grid; grid-template-columns:130px 1fr 1fr; gap:10px; align-items:center; padding:9px 6px; border-top:1px solid #eef2f6}
.row:first-child{border-top:0}
.chip{display:inline-flex; flex-direction:column; gap:1px; font-weight:800; font-size:14px; line-height:1.15}
.chip .rm{font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.02em}
.chip.sdp{font-size:13px}
.row input{width:100%}
.row .lg{position:relative}
.row .lg::after{content:"Logged"; position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:10px; font-weight:800; letter-spacing:.04em; color:var(--ok); opacity:0; transition:opacity .15s; pointer-events:none; background:linear-gradient(90deg,transparent,#fff 30%)}
.row .lg.has input{padding-right:56px}
.row .lg.has::after{opacity:1}
.chip .subj{font-size:11px; font-weight:700; color:var(--blue)}
.wkcap{font-size:11.5px; color:var(--muted); font-weight:600}
.wkpick{display:flex; align-items:stretch; gap:6px}
.wkpick input[type=date]{flex:1; min-width:0}
.wkarrow{appearance:none; border:1px solid var(--line); background:var(--surface); border-radius:var(--rs); width:38px; min-height:42px; cursor:pointer; font-size:18px; font-weight:800; color:var(--blue); box-shadow:var(--shs); flex:0 0 auto}
.wkarrow:hover{background:var(--blue-l); border-color:var(--blue)}
.row.extra{grid-template-columns:1.1fr 1fr 1fr auto; background:#f6f9fc; align-items:center}
.row.extra input{width:100%}
.row.extra .xdel{justify-self:end; appearance:none; border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:8px; width:40px; min-height:38px; cursor:pointer; font-size:18px; font-weight:700; line-height:1}
.row.extra .xdel:hover{border-color:#d66; color:#c0392b; background:#fff5f5}
.addx{display:block; width:100%; appearance:none; border:1px dashed var(--line); background:transparent; color:var(--blue); border-radius:10px; padding:10px 12px; font-weight:700; font-size:13px; cursor:pointer; margin-top:8px}
.addx:hover{border-color:var(--blue); background:var(--blue-l)}
.tag.extra{background:#fdeecf; color:#9a5b12}

/* Admin */
.filters{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-top:18px}
.filters .grow{flex:1 1 200px; min-width:160px}
.filters input[type=text]{width:100%}
.kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:18px}
.kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:15px 16px; box-shadow:var(--shs)}
.kpi .n{font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1}
.kpi .n small{font-size:16px; font-weight:700; color:var(--muted)}
.kpi .k{font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-top:7px}
.kpi.accent{background:linear-gradient(160deg,#3f6fbb,#274c87); color:#fff; border-color:transparent}
.kpi.accent .n small{color:#bcd2ef}
.kpi.accent .k{color:#bcd2ef}

.board{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh); margin-top:18px; padding:16px 16px 18px; overflow-x:auto}
.board h2{margin:0 0 3px; font-size:15px; font-weight:800}
.board .sub{margin:0 0 14px; font-size:12.5px; color:var(--muted)}
.grid{display:grid; grid-template-columns:180px repeat(5,1fr); gap:6px; min-width:620px}
.gh{font-size:11px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; color:var(--muted); padding:6px 4px; text-align:center; cursor:pointer; border-radius:8px}
.gh:hover{background:var(--blue-l); color:var(--blue)}
.gh.tl{text-align:left; cursor:default}
.gh.tl:hover{background:transparent; color:var(--muted)}
.gname{font-size:13px; font-weight:700; padding:0 8px; display:flex; align-items:center; cursor:pointer; border-radius:8px; min-height:44px}
.gname:hover{background:var(--blue-l); color:var(--blue)}
.cell{border-radius:9px; min-height:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; border:1px solid var(--line); cursor:pointer; transition:transform .08s}
.cell:hover{transform:translateY(-1px); box-shadow:var(--shs)}
.cell .cn{font-size:13px; font-weight:800}
.cell .cp{font-size:10px; font-weight:700; opacity:.85}
.cell.none{background:transparent; border-style:dashed; color:#b9c4cd; cursor:default}
.cell.none:hover{transform:none; box-shadow:none}
.cell.full{border-color:transparent}
.legend{display:flex; gap:14px; align-items:center; margin-top:14px; flex-wrap:wrap; font-size:12px; color:var(--muted); font-weight:600}
.legend .sw{display:inline-flex; align-items:center; gap:6px}
.legend i{width:16px; height:16px; border-radius:5px; display:inline-block; border:1px solid var(--line)}

.tablecard{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh); margin-top:18px; overflow:hidden}
.tablecard .th{display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid var(--line); gap:10px; flex-wrap:wrap}
.tablecard .th h2{margin:0; font-size:15px; font-weight:800}
.tablecard .th .meta{font-size:12.5px; color:var(--muted); font-weight:600}
.tscroll{overflow-x:auto}
table{border-collapse:collapse; width:100%; min-width:720px; font-size:13.5px}
th,td{text-align:left; padding:10px 14px; border-bottom:1px solid #eef2f6; vertical-align:top}
th{font-size:11px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); cursor:pointer; white-space:nowrap; background:#fafbfd; position:sticky; top:0}
th:hover{color:var(--blue)}
th .ar{opacity:.55; font-size:10px}
tbody tr:hover{background:var(--blue-l)}
td.cls{font-weight:800; white-space:nowrap}
td.rm{color:var(--muted); font-weight:600}
td.act{white-space:nowrap}
td .tag{font-size:10.5px; font-weight:800; letter-spacing:.03em; padding:2px 7px; border-radius:999px; background:var(--blue-l); color:var(--blue-d)}
td.empty{color:#b4bfc8}
td.upd{color:var(--muted); font-size:12px; white-space:nowrap}
.emptyrow{padding:40px 16px; text-align:center; color:var(--muted)}
.noclass{padding:14px 6px; color:var(--muted); font-size:13.5px; font-weight:600}
.modeseg{display:inline-flex; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:3px; box-shadow:var(--shs)}
.segbtn{appearance:none; border:none; background:transparent; color:var(--muted); font-weight:800; font-size:13px; padding:7px 15px; border-radius:999px; cursor:pointer; letter-spacing:.01em}
.segbtn.on{background:var(--blue); color:#fff}
.covbars{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:10px}
.covbar{border:1px solid var(--line); border-radius:12px; padding:11px 12px; cursor:pointer; transition:transform .08s, box-shadow .12s, border-color .12s; background:#fff}
.covbar:hover{transform:translateY(-1px); box-shadow:var(--shs); border-color:var(--blue)}
.cb-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.cb-name{font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.cb-num{font-size:12.5px; font-weight:800; color:var(--blue-d); white-space:nowrap}
.cb-ex{color:var(--orange)}
.cb-track{height:8px; background:#eef2f6; border-radius:999px; margin:8px 0 5px; overflow:hidden}
.cb-fill{height:100%; background:linear-gradient(90deg,#3f6fbb,#274c87); border-radius:999px; transition:width .3s}
.cb-fill.full{background:var(--ok)}
.cb-pct{font-size:11px; font-weight:700; color:var(--muted)}
td.dt{font-weight:700; white-space:nowrap; color:var(--blue-d)}
.banner.warn{background:#fff6e8; color:#7a4c00; border:1px solid #f3d199}
.mg-wrap{display:flex; flex-direction:column; gap:16px; margin-top:18px}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh); padding:16px}
.card-h{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px}
.card-h h2{margin:0; font-size:15px; font-weight:800}
.muted{color:var(--muted); font-weight:600; font-size:12.5px}
.mg-form{border:1px dashed var(--line); border-radius:var(--rs); padding:13px; margin-bottom:12px}
.mg-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px}
.mg-grid .field label{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
.mg-check{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; padding-top:4px}
.mg-check input{width:18px; height:18px}
.mg-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
.mg-list{display:flex; flex-direction:column}
.mg-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 2px; border-top:1px solid #eef2f6}
.mg-row:first-child{border-top:none}
.mg-row-main{display:flex; flex-direction:column; gap:2px; min-width:0}
.mg-row-main b{font-size:14px; font-weight:800}
.mg-row-side{display:flex; align-items:center; gap:7px; flex:0 0 auto}
.mini{appearance:none; border:1px solid var(--line); background:var(--surface); border-radius:8px; padding:6px 11px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--blue-d)}
.mini:hover{background:var(--blue-l); border-color:var(--blue)}
.mini.danger{color:var(--err, #c0392b)}
.mini.danger:hover{background:#fdeeec; border-color:#e6a89f}
.mg-chiprow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px}
.mg-chip{display:inline-flex; align-items:center; gap:5px; background:var(--blue-l); color:var(--blue-d); border-radius:999px; padding:5px 6px 5px 12px; font-size:13px; font-weight:700}
.mg-chip small{font-weight:700; opacity:.7}
.chip-x{appearance:none; border:none; background:rgba(0,0,0,.08); color:inherit; width:20px; height:20px; border-radius:50%; cursor:pointer; font-size:15px; line-height:1; display:flex; align-items:center; justify-content:center}
.chip-x:hover{background:#e0574a; color:#fff}
.mg-inline{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.mg-inline input{flex:1 1 180px; min-width:120px}
.mg-note{margin:0 0 12px; line-height:1.5}
.mg-note code{background:var(--blue-l); color:var(--blue-d); padding:1px 5px; border-radius:5px; font-size:12px; font-weight:700}
.mg-upload{position:relative; overflow:hidden; cursor:pointer}
.mg-upload input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%}
.mg-tt-preview{margin-top:14px; border-top:1px solid #eef2f6; padding-top:12px}
.mg-tt-day{display:flex; gap:10px; align-items:flex-start; padding:5px 0}
.mg-tt-dname{flex:0 0 34px; font-size:11px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; color:var(--muted); padding-top:3px}
.mg-tt-cells{display:flex; flex-wrap:wrap; gap:5px}
.mg-tt-cell{background:#eef2f6; border-radius:6px; padding:3px 8px; font-size:12.5px; font-weight:700}
.mg-details summary{font-size:15px; font-weight:800; cursor:pointer}
.mg-rooms{max-height:230px; overflow-y:auto; margin-top:12px}
@media (max-width:560px){ .mg-grid{grid-template-columns:1fr} }
.foot{margin-top:26px; text-align:center; color:var(--muted); font-size:12px; line-height:1.6}

.toast{position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(20px); background:#17233b; color:#fff; padding:11px 18px; border-radius:999px; font-size:13px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; transition:.2s; pointer-events:none; z-index:50; display:flex; gap:8px; align-items:center}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast .c{color:#7fe3b0}

@media (max-width:720px){
  .row{grid-template-columns:1fr; gap:7px; padding:12px 6px}
  .row.extra{grid-template-columns:1fr}
  .chip{flex-direction:row; align-items:baseline; gap:7px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .pill{margin-left:0; width:100%; justify-content:center}
  .wknav{flex:1 1 100%}
  .wknav .lbl{flex:1}
  .brand-txt h1{font-size:16px}
  .user .uname{display:none}
}
@media print{
  .top .tabs,.filters,.wknav,.pill,.btn,.banner,.board .legend,.foot,.user{display:none!important}
  body{background:#fff}
  .tablecard,.board,.kpi{box-shadow:none; border-color:#ccc}
  th{position:static}
}
</style>

<div class="top">
  <div class="wrap">
    <div class="brand">
      <img class="logo" src="logo.png" alt="Mount Carmel School">
      <div class="brand-txt">
        <h1>Class Log</h1>
        <span class="yr">Mount Carmel School · 2026–27</span>
      </div>
      <div class="user" id="userchip" hidden></div>
    </div>
    <div class="tabs" id="tabs" role="tablist" hidden>
      <button class="tab" id="tab-teacher" role="tab" aria-selected="true" onclick="setMode('teacher')">Log a class</button>

let SCHEDULE={}, CLASSES=[], DEPARTMENTS=[];

const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];
const DAYVAR={Monday:"--mon",Tuesday:"--tue",Wednesday:"--wed",Thursday:"--thu",Friday:"--fri"};

function classSort(a,b){const ga=parseInt(a),gb=parseInt(b);return ga!==gb?ga-gb:a.slice(String(ga).length).localeCompare(b.slice(String(gb).length));}
function ent(s){
  s=String(s||"").trim();
  if(s.indexOf("SDP:")===0){const g=s.slice(4).split(",").map(x=>x.trim()).filter(Boolean);return{act:"SDP",group:g,slug:"SDP_"+g.join("_"),label:"SDP "+g.join(", ")};}
  if(s.indexOf("Lib:")===0){const c=s.slice(4).trim();return{act:"Lib",code:c,room:ROOMS[c],slug:"Lib_"+c,label:"Lib "+c};}
  if(s.indexOf("libJ:")===0){const c=s.slice(5).trim();return{act:"libJ",code:c,room:ROOMS[c],slug:"libJ_"+c,label:"libJ "+c};}
  const c=s;return{act:"V.Ed.",code:c,room:ROOMS[c],slug:c,label:c};
}
const NAME=id=>(TEACHERS.find(t=>t.id===id)||{}).name||id;
const deptOf=id=>{const t=TEACHERS.find(x=>x.id===id);return t?t.dept:"";};
function rebuildDerived(){
  CLASSES=Object.keys(ROOMS).sort(classSort);
  DEPARTMENTS=[...new Set([...(DEPTS||[]), ...TEACHERS.map(t=>t.dept)])].filter(Boolean).sort();
  SCHEDULE={};
  for(const t of TEACHERS){ SCHEDULE[t.id]={}; for(const d of DAYS){ SCHEDULE[t.id][d]=(((RAW[t.id]||{})[d])||[]).map(ent); } }
}
rebuildDerived();

/* ---------- Backend: shared data → Cloudflare KV via Functions; prefs → localStorage ---------- */
let SID=""; try{ SID=localStorage.getItem("sid")||""; }catch(e){}
const prefGet = k => { try{return localStorage.getItem(k);}catch(e){return null;} };
const prefSet = (k,v) => { try{ if(v===""||v==null) localStorage.removeItem(k); else localStorage.setItem(k,v);}catch(e){} };
function authHeaders(extra){ const h=Object.assign({},extra||{}); if(SID) h["Authorization"]="Bearer "+SID; return h; }
async function apiGet(key){ try{ const r=await fetch(API_BASE+"/api/data?key="+encodeURIComponent(key),{headers:authHeaders()}); if(r.status===401){onAuthLost();return null;} if(!r.ok) return null; return (await r.json()).value; }catch(e){ return null; } }
async function apiSet(key,value){ try{ const r=await fetch(API_BASE+"/api/data",{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:JSON.stringify({key,value})}); if(r.status===401){onAuthLost();return false;} return r.ok; }catch(e){ return false; } }
const store={ ok:true,
  async get(k,shared){ return shared ? await apiGet(k) : prefGet(k); },
  async set(k,v,shared){ if(shared) return await apiSet(k,v); prefSet(k,v); return true; } };
const wkey=(week,id)=>"w:"+week+":"+id;
async function loadConfig(){ try{ const r=await fetch(API_BASE+"/api/config"); if(r.ok){ const d=await r.json(); if(d.clientId) GOOGLE_CLIENT_ID=d.clientId; } }catch(e){} }
function onAuthLost(){ SID=""; prefSet("sid",""); prefSet("session:user",""); state.user=null; if(pollTimer){clearInterval(pollTimer);pollTimer=null;} try{ if(document.getElementById("toast")) toast("Session expired — please sign in again","⚠"); }catch(e){} showGate(); }
async function whoami(){
  if(!SID) return {ok:false};
  try{
    const r=await fetch(API_BASE+"/api/whoami",{headers:authHeaders()});
    if(r.status===401){ SID=""; prefSet("sid",""); prefSet("session:user",""); return {ok:false}; }
    if(!r.ok) return {ok:false};
    const d=await r.json();
    return {ok:true, email:d.email||"", admin:!!d.admin, bootstrap:!!d.bootstrap};
  }catch(e){ return {ok:false}; }
}
async function apiGetMany(keys){
  try{
    const r=await fetch(API_BASE+"/api/data?keys="+encodeURIComponent(keys.join(",")),{headers:authHeaders()});
    if(r.status===401){ onAuthLost(); return {}; }
    if(!r.ok) return {};
    return (await r.json()).values || {};
  }catch(e){ return {}; }
}

/* ---------- Dates ---------- */
const pad=n=>String(n).padStart(2,"0");
const ymd=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
function mondayOf(d){const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);return x;}
function parseYmd(s){const p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());x.setDate(x.getDate()+n);return x;}
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function weekRange(week){const m=parseYmd(week),f=addDays(m,4);
  if(m.getMonth()===f.getMonth())return m.getDate()+"–"+f.getDate()+" "+MON[m.getMonth()]+" "+m.getFullYear();
  const sameY=m.getFullYear()===f.getFullYear();
  return m.getDate()+" "+MON[m.getMonth()]+(sameY?"":" "+m.getFullYear())+" – "+f.getDate()+" "+MON[f.getMonth()]+" "+f.getFullYear();}
function dayDate(week,i){const d=addDays(parseYmd(week),i);return d.getDate()+" "+MON[d.getMonth()];}
const MONFULL=["January","February","March","April","May","June","July","August","September","October","November","December"];
const ALLDAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const dayIndex=n=>ALLDAYS.indexOf(n);
function dayName(dateStr){const d=parseYmd(dateStr);return ALLDAYS[(d.getDay()+6)%7];}
function dateOf(weekMonday,dName){const i=dayIndex(dName);return ymd(addDays(parseYmd(weekMonday),i<0?0:i));}
function niceDate(dateStr){const d=parseYmd(dateStr);return d.getDate()+" "+MON[d.getMonth()]+" "+d.getFullYear();}
function shortDate(dateStr){const d=parseYmd(dateStr);return ALLDAYS[(d.getDay()+6)%7].slice(0,3)+" "+d.getDate()+" "+MON[d.getMonth()];}
function monthOf(dateStr){return dateStr.slice(0,7);}
function monthLabel(dateStr){const d=parseYmd(dateStr);return MONFULL[d.getMonth()]+" "+d.getFullYear();}
function weeksInMonth(dateStr){const d=parseYmd(dateStr),y=d.getFullYear(),m=d.getMonth();const last=new Date(y,m+1,0);let mon=mondayOf(new Date(y,m,1));const out=[];while(mon<=last){out.push(ymd(mon));mon=addDays(mon,7);}return out;}
const thisWeek=ymd(mondayOf(new Date()));
const today=ymd(new Date());

/* ---------- State ---------- */
const state={mode:"teacher", user:null, teacherId:null, isAdmin:false, email:"", bootstrapAdmin:false, date:today, blob:{},

/* ---------- Auth / gate ---------- */
const GOOGLE_G='<svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18c-.44-1.32-.69-2.73-.69-4.18s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>';

function showGate(){
  document.getElementById("tabs").hidden=true;
  document.getElementById("userchip").hidden=true;

  view().innerHTML=`
    <div class="gate"><div class="gate-card">

function initGoogle(){
  const host=document.getElementById("gbtn"); if(!host)return;
  if(GOOGLE_CLIENT_ID && window.google && window.google.accounts && window.google.accounts.id){
    try{
      window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID, callback:onCredential, auto_select:false});
      host.innerHTML="";
      window.google.accounts.id.renderButton(host,{theme:"outline",size:"large",type:"standard",text:"continue_with",shape:"pill",width:280});
      return;
    }catch(e){}
  }
  host.innerHTML=`<button class="gbtn" disabled aria-disabled="true">${GOOGLE_G}<span>${GOOGLE_CLIENT_ID?"Loading Google sign-in…":"Continue with Google"}</span></button>`;
}

function loadGis(){ try{ if(document.getElementById("gis-sdk"))return; var s=document.createElement("script"); s.id="gis-sdk"; s.src="https://accounts.google.com/gsi/client"; s.async=true; s.defer=true; s.onload=onGisLoad; document.head.appendChild(s); }catch(e){} }
function onCredential(resp){ doLogin(resp&&resp.credential||""); }
async function doLogin(cred){
  if(!cred){ toast("Sign-in failed","⚠"); return; }
  try{
    const r=await fetch(API_BASE+"/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({credential:cred})});
    if(!r.ok){ let e={}; try{e=await r.json();}catch(_){} toast((e.error==="domain not allowed"||e.error==="email not allowed")?"This account isn't allowed":"Sign-in failed","⚠"); return; }
    const d=await r.json(); SID=d.sid||""; prefSet("sid",SID);
    signIn(Object.assign({method:"google"}, d.user||{}));
  }catch(e){ toast("Sign-in failed — check connection","⚠"); }
}

function normName(s){return String(s||"").toLowerCase().replace(/^(ms|mr|mrs|dr)\.?\s+/,"").replace(/[^a-z ]/g,"").replace(/\s+/g," ").trim();}
function matchTeacher(name){const n=normName(name);if(!n)return null;for(const t of TEACHERS){if(normName(t.name)===n)return t.id;}
  const first=n.split(" ")[0];for(const t of TEACHERS){if(normName(t.name).split(" ")[0]===first)return t.id;}return null;}
function firstName(name){const n=String(name||"").replace(/^(Ms|Mr|Mrs|Dr)\.?\s+/i,"").trim();return n.split(/\s+/)[0]||"there";}

async function signIn(user){
  state.user=user;
  await store.set("session:user",JSON.stringify(user),false);
  const who=await whoami();
  state.isAdmin=who.ok&&who.admin; state.email=(who.ok&&who.email)||user.email||""; state.bootstrapAdmin=who.ok&&who.bootstrap;
  await loadAppConfig();
  const last=await store.get("device:lastTeacher",false);
  if(last && TEACHERS.some(t=>t.id===last)) state.teacherId=last;
  else if(user.method==="google"){ const m=matchTeacher(user.name); if(m) state.teacherId=m; }
  renderUser(); showApp();
}
async function signOut(){
  try{ await fetch(API_BASE+"/api/logout",{method:"POST",headers:authHeaders()}); }catch(e){}
  SID=""; prefSet("sid",""); prefSet("session:user","");
  state.user=null;
  try{ if(window.google&&window.google.accounts&&window.google.accounts.id) window.google.accounts.id.disableAutoSelect(); }catch(e){}
  showGate();
}
function renderUser(){
  const chip=document.getElementById("userchip"); const u=state.user;
  if(!u){chip.hidden=true;chip.innerHTML="";return;}
  chip.hidden=false;
  const av=u.picture?`<img src="${esc(u.picture)}" alt="" referrerpolicy="no-referrer">`:`<span class="av">${esc((u.name||"?").trim()[0]||"?")}</span>`;
  chip.innerHTML=`${av}<span class="uname">${esc(firstName(u.name))}</span><button class="signout" onclick="signOut()">Sign out</button>`;
}
function showApp(){ document.getElementById("tabs").hidden=false; const mt=document.getElementById("tab-manage"); if(mt) mt.hidden=!state.isAdmin; renderUser(); mountView(); }

function setMode(m){
  if(m==="manage" && !state.isAdmin) m="teacher";
  state.mode=m;
  document.getElementById("tab-teacher").setAttribute("aria-selected",m==="teacher");
  document.getElementById("tab-admin").setAttribute("aria-selected",m==="admin");
  const tm=document.getElementById("tab-manage"); if(tm) tm.setAttribute("aria-selected",m==="manage");
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  mountView();
}
function mountView(){ if(!state.user){ showGate(); return; } if(state.mode==="manage"){ if(!state.isAdmin){ state.mode="teacher"; return mountTeacher(); } return mountManage(); } if(state.mode==="teacher")mountTeacher(); else mountAdmin(); }

/* ---------- Teacher view ---------- */
function scheduledCount(id){let n=0;for(const d of DAYS)n+=SCHEDULE[id][d].length;return n;}
function loggedCount(blob){let n=0;for(const k in blob){if(k==="_x")continue; if((blob[k].t||"").trim())n++;}return n;}
async function mountTeacher(){
  const opts=TEACHERS.map(t=>`<option value="${t.id}"${t.id===state.teacherId?" selected":""}>${esc(t.name)}</option>`).join("");

    <div class="ctl">
      <div class="field" style="min-width:230px">
        <label for="who">Your name</label>
        <select id="who" onchange="onTeacher(this.value)">
          <option value=""${state.teacherId?"":" selected"} disabled>Select your name…</option>${opts}
        </select>
      </div>
      <div class="field"><label for="dpick">Date</label>
        <div class="wkpick">
          <button class="wkarrow" aria-label="Previous day" onclick="dayStep(-1)">‹</button>
          <input type="date" id="dpick" value="${state.date}" onchange="pickDate(this.value)">
          <button class="wkarrow" aria-label="Next day" onclick="dayStep(1)">›</button>
        </div>
        <span class="wkcap" id="dcap">${esc(dayName(state.date))} · ${esc(niceDate(state.date))}</span>
      </div>
      <div class="pill" id="prog"><span class="dot"></span><span id="prog-txt">—</span></div>
    </div>
    <div id="day"></div>`;

function showTeacherPrompt(){
  document.getElementById("day").innerHTML=`<div class="prompt"><b>Pick your name to begin</b>Choose a date above and your classes for that day appear below. Type what you covered — it saves automatically.</div>`;
  document.getElementById("prog").style.visibility="hidden";
}
async function onTeacher(id){ state.teacherId=id; await store.set("device:lastTeacher",id,false); await loadTeacher(); }
function updateDateCap(){ const el=document.getElementById("dcap"); if(el)el.textContent=dayName(state.date)+" · "+niceDate(state.date); const inp=document.getElementById("dpick"); if(inp)inp.value=state.date; }
async function pickDate(v){ if(!v)return; state.date=v; updateDateCap(); if(state.teacherId) await loadTeacher(); }
async function dayStep(n){ state.date=ymd(addDays(parseYmd(state.date),n)); updateDateCap(); if(state.teacherId) await loadTeacher(); }
async function loadTeacher(){ const raw=await store.get(wkey(curWeek(),state.teacherId),true); state.blob=raw?JSON.parse(raw):{}; renderDay(); }
function updateProg(){
  const pill=document.getElementById("prog"); if(!pill)return;
  const id=state.teacherId, dName=dayName(state.date);
  const list=(SCHEDULE[id]&&SCHEDULE[id][dName])||[];
  const total=list.length, done=list.filter(e=>((state.blob[dkeyOf(dName,e.slug)]||{}).t||"").trim()).length;
  pill.style.visibility="visible";
  document.getElementById("prog-txt").textContent = total ? (done+" of "+total+" classes logged") : "No scheduled classes";
  pill.classList.toggle("done",total>0&&done===total);
}
function subjectOf(act,dept){ return (act==="Lib"||act==="libJ") ? "Library" : (act==="SDP" ? "SDP" : (dept||"Value Education")); }
function renderDay(){
  const host=document.getElementById("day"); const id=state.teacherId; const dept=deptOf(id);
  const dName=dayName(state.date); const isWknd=(dName==="Saturday"||dName==="Sunday");
  const list=(SCHEDULE[id]&&SCHEDULE[id][dName])||[];

function editX(day,idx,field,val){
  if(!state.blob._x) state.blob._x={};

function addX(day){
  if(!state.blob._x) state.blob._x={};

function removeX(day,idx){

function setAdminMode(m){ state.admin.mode=m; if(m==="day")state.admin.day="all"; if(pollTimer){clearInterval(pollTimer);pollTimer=null;} mountAdmin(); }
function syncFilterUI(){const a=state.admin;const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};set("f-dep",a.dept);set("f-t",a.teacher);set("f-c",a.cls);set("f-d",a.day);set("f-sort",a.sortKey);set("f-q",a.q);const r=document.getElementById("arange");if(r)r.textContent=rangeLabel();}

async function refreshAdmin(manual){ const weeks=rangeWeeks(); const nb={}; await Promise.all(weeks.map(wk=>Promise.all(TEACHERS.map(async t=>{const raw=await store.get(wkey(wk,t.id),true);nb[wk+"|"+t.id]=raw?JSON.parse(raw):{};})))); adminBlobs=nb; renderAdminResults(); if(manual)toast("Up to date","↻"); }
function scopeTeachers(){

function classMatch(e,cls){ if(cls==="all")return true; if(e.group)return e.group.indexOf(cls)>=0; return e.code===cls; }
function buildRows(){
  const a=state.admin, q=a.q.trim().toLowerCase(), rows=[]; const weeks=rangeWeeks(); const ids=scopeTeachers();
  for(const wk of weeks){
    for(const id of ids){
      const blob=adminBlobs[wk+"|"+id]||{}; const dept=deptOf(id);
      for(const day of DAYS){
        const dateStr=dateOf(wk,day);
        if(!inRange(dateStr))continue;
        if(a.day!=="all"&&day!==a.day)continue;
        for(const e of SCHEDULE[id][day]){
          if(!classMatch(e,a.cls))continue;
          const rec=blob[dkeyOf(day,e.slug)]||{}, topic=(rec.t||""), remark=(rec.r||"");
          if(q && !(topic.toLowerCase().includes(q)||remark.toLowerCase().includes(q)||(e.code||"").toLowerCase().includes(q)))continue;
          rows.push({teacher:id,tname:NAME(id),dept,date:dateStr,day,dayi:dayIndex(day),cls:e.group?e.group.join(", "):e.code,code:e.code||"",room:e.room||"",act:e.act,subject:subjectOf(e.act,dept),topic,remark,u:rec.u||"",logged:!!topic.trim(),extra:false});
        }
      }
      const xd=blob._x||{};
      for(const dName of Object.keys(xd)){
        const dateStr=dateOf(wk,dName);
        if(!inRange(dateStr))continue;
        if(a.day!=="all"&&dName!==a.day)continue;
        (xd[dName]||[]).forEach(x=>{
          const desc=(x.c||""), topic=(x.t||""), remark=(x.r||"");
          if(!desc.trim() && !topic.trim() && !remark.trim()) return;
          if(a.cls!=="all") return;
          if(q && !(desc.toLowerCase().includes(q)||topic.toLowerCase().includes(q)||remark.toLowerCase().includes(q))) return;
          rows.push({teacher:id,tname:NAME(id),dept,date:dateStr,day:dName,dayi:dayIndex(dName),cls:desc||"(no description)",code:"",room:"",act:"Extra",subject:"Extra",topic,remark,u:x.u||"",logged:!!(desc.trim()||topic.trim()),extra:true});
        });
      }
    }
  }
  return rows;
}

      <div class="cb-track"><div class="cb-fill${full?" full":""}" style="width:${o.s?pctT:0}%"></div></div>

  const sorted=rows.slice().sort((x,y)=>{let r=0;const k=a.sortKey;

  html+=`</tbody></table></div></div>`;
  host.innerHTML=html;
}
function cmpClass(a,b){if(!a)return 1;if(!b)return -1;const ga=parseInt(a),gb=parseInt(b);return ga!==gb?ga-gb:a.localeCompare(b);}
function sortBy(k){ const a=state.admin; if(a.sortKey===k)a.sortDir*=-1; else{a.sortKey=k;a.sortDir=1;} const el=document.getElementById("f-sort"); if(el && ["date","teacher","cls","upd"].indexOf(k)>=0)el.value=k; renderAdminResults(); }
function fmtWhen(iso){const d=new Date(iso);if(isNaN(d))return "—";return d.getDate()+" "+MON[d.getMonth()]+", "+pad(d.getHours())+":"+pad(d.getMinutes());}
function exportCSV(){
  const a=state.admin;
  const rows=buildRows().slice().sort((x,y)=>(x.date||"").localeCompare(y.date||"")||x.tname.localeCompare(y.tname)||cmpClass(x.code,y.code));
  const head=["Date","Day","Teacher","Class","Room","Subject","Topic covered","Remark","Updated"];
  const q=v=>{v=v==null?"":String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  let csv=head.join(",")+"\n"; for(const r of rows)csv+=[r.date,r.day,r.tname,r.cls,r.room,r.subject,r.topic,r.remark,r.u?fmtWhen(r.u):""].map(q).join(",")+"\n";
  const tag=a.mode==="month"?monthOf(a.date):a.date;
  const fn="class-log_"+a.mode+"_"+tag+(a.teacher==="all"?"":"_"+a.teacher)+".csv";
  try{const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download=fn;document.body.appendChild(el);el.click();setTimeout(()=>{URL.revokeObjectURL(url);el.remove();},500);toast("CSV downloaded","↓");}
  catch(e){const w=window.open("","_blank");if(w){w.document.write("<pre>"+esc(csv)+"</pre>");w.document.title=fn;}else{console.log(csv);toast("Copy blocked — see console","•");}}
}

    <p class="muted mg-note">Edit a teacher's weekly timetable with a CSV sheet: pick the teacher, download their sheet (or a blank one), fill class codes under each period, then upload it back. Rows are weekdays; columns are periods P1–P${PERIODS}. Leave a cell blank for a free period. Special cells: library = <code>Lib:9C</code>, junior library = <code>libJ:7B</code>, group/SDP session = <code>SDP:12F;12B;12D</code> (separate classes with semicolons).</p>
    <div class="field" style="max-width:340px"><label>Teacher</label><select id="tt-teacher" onchange="mgPickTT(this.value)">${tsel}</select></div>
    <div class="mg-actions">
      <button class="btn" onclick="mgDownloadTeacher()">Download this teacher's timetable</button>
      <button class="btn" onclick="mgDownloadBlank()">Download blank template</button>
      <label class="btn primary mg-upload">Upload CSV for this teacher<input type="file" accept=".csv,text/csv" onchange="mgUploadTeacher(this.files)"></label>
    </div>`;
  if(cur){
    html+=`<div class="mg-tt-preview"><div class="muted" style="margin-bottom:6px">Current — ${esc(cur.name)}</div>`;
    DAYS.forEach(d=>{
      const arr=((RAW[cur.id]||{})[d])||[];
      html+=`<div class="mg-tt-day"><span class="mg-tt-dname">${d.slice(0,3)}</span><span class="mg-tt-cells">${arr.length?arr.map(x=>`<span class="mg-tt-cell">${esc(x)}</span>`).join(""):`<span class="muted">—</span>`}</span></div>`;
    });
    html+=`</div>`;
  }
  html+=`</section>`;

  // ---- Rooms ----
  html+=`<section class="card"><details class="mg-details"><summary>Rooms (class → room number)</summary>
    <p class="muted mg-note">The room shown beside each class in the log comes from here.</p>
    <div class="mg-inline"><input id="room-code" type="text" placeholder="Class e.g. 8A" style="max-width:130px"><input id="room-num" type="text" placeholder="Room e.g. 102" style="max-width:130px"><button class="btn" onclick="mgSaveRoom()">Add / update</button></div>
    <div class="mg-chiprow mg-rooms">`;
  CLASSES.forEach(c=>{ html+=`<span class="mg-chip">${esc(c)} <small>${esc(String(ROOMS[c]))}</small><button class="chip-x" title="Remove" onclick="mgDelRoom('${esc(c)}')">×</button></span>`; });
  html+=`</div></details></section>`;

  html+=`</div>`;
  view().innerHTML=html;
}

/* ----- Teacher handlers ----- */
function slugId(name){ let s=String(name||"").toLowerCase().replace(/^(ms|mr|mrs|dr)\.?\s+/,"").replace(/[^a-z0-9]+/g,"").slice(0,20); return s||"t"; }
function uniqueId(base){ let id=base,n=2; while(TEACHERS.some(t=>t.id===id)){ id=base+n; n++; } return id; }
function mgNewTeacher(){ TF={id:null,name:"",email:"",dept:DEPARTMENTS[0]||"",admin:false}; mountManage(); }
function mgPrefillMe(){ TF.name=TF.name||((state.user&&state.user.name)||""); TF.email=state.email||""; TF.admin=true; mountManage(); }
function mgEditTeacher(id){ const t=TEACHERS.find(x=>x.id===id); if(!t)return; TF={id:t.id,name:t.name||"",email:t.email||"",dept:t.dept||(DEPARTMENTS[0]||""),admin:!!t.admin}; mountManage(); try{view().scrollIntoView({behavior:"smooth",block:"start"});}catch(e){} }
async function mgSaveTeacher(){
  const name=(document.getElementById("tf-name").value||"").trim();
  const emailV=(document.getElementById("tf-email").value||"").trim().toLowerCase();
  const dept=(document.getElementById("tf-dept").value||"").trim();
  const admin=!!document.getElementById("tf-admin").checked;
  if(!name){ toast("Enter a name","⚠"); return; }
  if(emailV && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailV)){ toast("That email looks off","⚠"); return; }
  if(TF.id){
    const t=TEACHERS.find(x=>x.id===TF.id); if(!t){ mgNewTeacher(); return; }
    if(t.email && t.email===state.email && !admin && !confirm("This removes your own admin rights — you may lose access to this Admin tab after reloading. Continue?")) return;
    t.name=name; t.email=emailV; t.dept=dept; t.admin=admin;
  }else{
    const id=uniqueId(slugId(name));
    TEACHERS.push({id,name,email:emailV,dept,admin});
    if(!RAW[id]) RAW[id]={};
  }
  await saveTeachersCfg();
  mgNewTeacher();
}
async function mgDeleteTeacher(id){
  const t=TEACHERS.find(x=>x.id===id); if(!t)return;
  if(!confirm(`Remove ${t.name}? Their saved class logs are kept, but they'll no longer appear in the app.`)) return;
  TEACHERS=TEACHERS.filter(x=>x.id!==id);
  delete RAW[id];
  if(MG_TT===id) MG_TT=TEACHERS[0]?TEACHERS[0].id:null;
  if(TF.id===id) TF={id:null,name:"",email:"",dept:DEPARTMENTS[0]||"",admin:false};
  await saveTeachersCfg();
  await saveScheduleCfg();
  mountManage();
}

/* ----- Department handlers ----- */
async function mgAddDept(){
  const el=document.getElementById("dept-new"); const v=(el&&el.value||"").trim();
  if(!v){ toast("Enter a department name","⚠"); return; }
  if(!DEPTS.some(d=>d.toLowerCase()===v.toLowerCase()) && !DEPARTMENTS.some(d=>d.toLowerCase()===v.toLowerCase())) DEPTS.push(v);
  await saveDeptsCfg();
  mountManage();
}
async function mgDelDept(name){
  const count=TEACHERS.filter(t=>t.dept===name).length;
  if(count>0){ toast(count+" teacher(s) still in this dept — reassign them first","⚠"); return; }
  DEPTS=DEPTS.filter(d=>d!==name);
  await saveDeptsCfg();
  mountManage();
}

/* ----- Room handlers ----- */
async function mgSaveRoom(){
  const c=(document.getElementById("room-code").value||"").trim().toUpperCase();
  const n=(document.getElementById("room-num").value||"").trim();
  if(!c||!n){ toast("Enter both a class and a room","⚠"); return; }
  ROOMS[c]=/^\d+$/.test(n)?parseInt(n,10):n;
  await saveRoomsCfg();
  mountManage();
}
async function mgDelRoom(c){
  if(!confirm("Remove room mapping for "+c+"?")) return;
  delete ROOMS[c];
  await saveRoomsCfg();
  mountManage();
}

/* ----- Timetable CSV ----- */
function mgPickTT(id){ MG_TT=id; mountManage(); }
function csvCell(v){ v=v==null?"":String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function toCSV(rows){ return rows.map(r=>r.map(csvCell).join(",")).join("\r\n")+"\r\n"; }
function parseCSV(text){
  const rows=[]; let row=[], cur="", i=0, q=false; text=String(text||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i+=2;continue;} q=false;i++;continue; } cur+=ch;i++;continue; }
    if(ch==='"'){ q=true;i++;continue; }
    if(ch===','){ row.push(cur);cur="";i++;continue; }
    if(ch==='\n'){ row.push(cur);rows.push(row);row=[];cur="";i++;continue; }
    cur+=ch;i++;
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function cellOut(s){ s=String(s||""); return s.indexOf("SDP:")===0 ? "SDP:"+s.slice(4).split(",").map(x=>x.trim()).filter(Boolean).join(";") : s; }
function cellIn(s){ s=String(s||"").trim(); if(!s) return ""; if(s.indexOf("SDP:")===0) return "SDP:"+s.slice(4).split(/[;,]/).map(x=>x.trim()).filter(Boolean).join(","); return s; }
function matchDay(s){ s=String(s||"").trim().toLowerCase(); for(const d of DAYS){ if(d.toLowerCase()===s) return d; } for(const d of DAYS){ if(s.length>=3 && d.toLowerCase().slice(0,3)===s.slice(0,3)) return d; } return null; }
function ttHeader(){ const h=["Day"]; for(let p=1;p<=PERIODS;p++) h.push("P"+p); return h; }
function timetableCSV(id){
  const rows=[ttHeader()];
  DAYS.forEach(d=>{ const arr=(((RAW[id]||{})[d])||[]).slice(0,PERIODS).map(cellOut); while(arr.length<PERIODS) arr.push(""); rows.push([d,...arr]); });
  return toCSV(rows);
}
function blankCSV(){ const rows=[ttHeader()]; DAYS.forEach(d=>{ const a=[d]; for(let p=1;p<=PERIODS;p++) a.push(""); rows.push(a); }); return toCSV(rows); }
function downloadCSV(name,csv){
  try{ const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500); toast("CSV downloaded","↓"); }
  catch(e){ const w=window.open("","_blank"); if(w){ w.document.write("<pre>"+esc(csv)+"</pre>"); w.document.title=name; } }
}
function mgDownloadTeacher(){ const id=MG_TT||(TEACHERS[0]&&TEACHERS[0].id); if(!id)return; downloadCSV("timetable_"+id+".csv", timetableCSV(id)); }
function mgDownloadBlank(){ downloadCSV("timetable_template.csv", blankCSV()); }
function applyTimetableCSV(id,text){
  const rows=parseCSV(text).filter(r=>r.some(c=>String(c).trim()!==""));
  const newRaw={}; const unknown=new Set(); let count=0;
  rows.forEach(r=>{
    const day=matchDay(r[0]); if(!day) return;
    const cells=r.slice(1).map(cellIn).filter(Boolean);
    cells.forEach(c=>{ const e=ent(c); if((e.act==="V.Ed."||e.act==="Lib"||e.act==="libJ") && ROOMS[e.code]===undefined) unknown.add(e.code); });
    newRaw[day]=cells; count++;
  });
  RAW[id]=newRaw;
  return {days:count, unknown:[...unknown]};
}
function mgUploadTeacher(files){
  const id=MG_TT||(TEACHERS[0]&&TEACHERS[0].id); if(!id){ toast("Pick a teacher first","⚠"); return; }
  const f=files&&files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=async()=>{
    const res=applyTimetableCSV(id,String(reader.result||""));
    if(!res.days){ toast("No day rows found in that CSV","⚠"); return; }
    await saveScheduleCfg();
    mountManage();
    if(res.unknown.length) setTimeout(()=>toast("Saved. Unknown class(es): "+res.unknown.join(", ")+" — add them under Rooms","⚠"),400);
  };
  reader.onerror=()=>toast("Couldn't read that file","⚠");
  reader.readAsText(f);
}

/* ---------- Boot ---------- */
(async function(){
  loadGis();
  await loadConfig();
  const raw=prefGet("session:user");
  if(SID && raw){ try{ const u=JSON.parse(raw); if(u&&u.name) state.user=u; }catch(e){} }
  if(state.user){
    const who=await whoami();
    if(!who.ok){ state.user=null; showGate(); return; }
    state.isAdmin=who.admin; state.email=who.email; state.bootstrapAdmin=who.bootstrap;
    await loadAppConfig();
    const last=prefGet("device:lastTeacher");
    if(last && TEACHERS.some(t=>t.id===last)) state.teacherId=last;
    renderUser(); showApp();
  }else{ state.user=null; showGate(); }
})();
</script>
